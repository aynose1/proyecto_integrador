{% extends "base.html" %}
{% block title %}Iniciar sesión — {{ app_name }}{% endblock %}

{% block auth_content %}
<div class="auth-card card shadow">
  <div class="card-body p-4">
    <p class="auth-brand mb-1"><i class="bi bi-recycle"></i> {{ app_name }}</p>
    <h1 class="h4 mb-1">Iniciar sesión</h1>
    <p class="text-muted mb-4">Accede con tu cuenta de administrador.</p>

    <form method="post" action="{{ url_for('auth.login') }}">
      <div class="mb-3">
        <label class="form-label" for="codigo_usuario">Código de usuario</label>
        <input type="text" class="form-control" id="codigo_usuario" name="codigo_usuario" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label" for="contrasena">Contraseña</label>
        <input type="password" class="form-control" id="contrasena" name="contrasena" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>

    <p class="text-center text-muted mt-4 mb-0 small">
      ¿No tienes cuenta?
      <a class="auth-link" href="{{ url_for('auth.register') }}">Regístrate como administrador</a>
    </p>
  </div>
</div>
{% endblock %}
