{% extends "base.html" %}
{% block title %}Registro — {{ app_name }}{% endblock %}

{% block auth_content %}
<div class="auth-card card shadow">
  <div class="card-body p-4">
    <p class="auth-brand mb-1"><i class="bi bi-recycle"></i> {{ app_name }}</p>
    <h1 class="h4 mb-1">Registro de administrador</h1>
    <p class="text-muted mb-4">Crea tu cuenta para gestionar el sistema.</p>

    <form method="post" action="{{ url_for('auth.register') }}">
      <div class="mb-3">
        <label class="form-label" for="codigo_usuario">Código de usuario</label>
        <input type="text" class="form-control" id="codigo_usuario" name="codigo_usuario" required maxlength="20" autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label" for="nombre">Nombre</label>
        <input type="text" class="form-control" id="nombre" name="nombre" required maxlength="100">
      </div>
      <div class="mb-3">
        <label class="form-label" for="apellido_paterno">Apellido paterno</label>
        <input type="text" class="form-control" id="apellido_paterno" name="apellido_paterno" required maxlength="100">
      </div>
      <div class="mb-3">
        <label class="form-label" for="apellido_materno">Apellido materno <span class="text-muted">(opcional)</span></label>
        <input type="text" class="form-control" id="apellido_materno" name="apellido_materno" maxlength="100">
      </div>
      <div class="mb-3">
        <label class="form-label" for="contrasena">Contraseña</label>
        <input type="password" class="form-control" id="contrasena" name="contrasena" required minlength="8">
        <div class="form-text">Mínimo 8 caracteres.</div>
      </div>
      <div class="mb-4">
        <label class="form-label" for="contrasena_confirm">Confirmar contraseña</label>
        <input type="password" class="form-control" id="contrasena_confirm" name="contrasena_confirm" required minlength="8">
      </div>
      <button type="submit" class="btn btn-primary w-100">Crear cuenta</button>
    </form>

    <p class="text-center text-muted mt-4 mb-0 small">
      ¿Ya tienes cuenta?
      <a class="auth-link" href="{{ url_for('auth.login') }}">Inicia sesión</a>
    </p>
  </div>
</div>
{% endblock %}
